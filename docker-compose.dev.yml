services:
  app:
    env_file: .env
    networks:
      - default
    ports:
      - '3000:3000'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortstack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:

networks:
  coolify:
    name: coolify-dev
    driver: bridge
